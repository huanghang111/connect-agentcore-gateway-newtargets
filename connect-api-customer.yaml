          def search_faq(query):
              """Simple keyword-based FAQ search"""
              query_lower = query.lower()
              results = []
              
              for faq in FAQ_DATABASE:
                  score = 0
                  
                  # Check if query matches question
                  if query_lower in faq['question'].lower():
                      score += 10
                  
                  # Check if query matches answer
                  if query_lower in faq['answer'].lower():
                      score += 5
                  
                  # Check if query matches keywords
                  for keyword in faq['keywords']:
                      if keyword in query_lower or query_lower in keyword:
                          score += 3
                  
                  # Check for word matches
                  query_words = query_lower.split()
                  for word in query_words:
                      if len(word) > 3:  # Only check words longer than 3 characters
                          if word in faq['question'].lower():
                              score += 2
                          if word in faq['answer'].lower():
                              score += 1
                          for keyword in faq['keywords']:
                              if word in keyword:
                                  score += 2
                  
                  if score > 0:
                      results.append({
                          'id': faq['id'],
                          'category': faq['category'],
                          'question': faq['question'],
                          'answer': faq['answer'],
                          'score': score
                      })
              
              # Sort by score (highest first) and return top 5
              results.sort(key=lambda x: x['score'], reverse=True)
              return results[:5]

          def handler(event, context):
              request_id = event.get('requestContext', {}).get('requestId', 'unknown')
              print(json.dumps({
                  'level': 'INFO',
                  'message': 'FAQ simple search request received',
                  'requestId': request_id,
                  'event': event
              }))

              try:
                  # Handle both API Gateway and direct invocation
                  if 'body' in event and event['body']:
                      body = json.loads(event['body'])
                  else:
                      body = event

                  query = body.get('query')

                  if not query:
                      print(json.dumps({
                          'level': 'WARN',
                          'message': 'Missing query parameter',
                          'requestId': request_id
                      }))
                      return {
                          'statusCode': 400,
                          'headers': {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                          },
                          'body': json.dumps({'error': 'query parameter is required'})
                      }

                  print(json.dumps({
                      'level': 'INFO',
                      'message': 'Searching FAQ database',
                      'requestId': request_id,
                      'query': query
                  }))

                  # Search FAQ database
                  results = search_faq(query)

                  result = {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      'body': json.dumps({
                          'query': query,
                          'results': results,
                          'count': len(results),
                          'source': 'simple_faq_database'
                      })
                  }

                  print(json.dumps({
                      'level': 'INFO',
                      'message': 'FAQ search completed successfully',
                      'requestId': request_id,
                      'resultCount': len(results),
                      'response': result
                  }))

                  return result

              except Exception as e:
                  print(json.dumps({
                      'level': 'ERROR',
                      'message': 'Error searching FAQ',
                      'requestId': request_id,
                      'error': str(e),
                      'stack': traceback.format_exc()
                  }))
                  return {
                      'statusCode': 500,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      'body': json.dumps({
                          'error': 'Internal server error',
                          'message': str(e)
                      })
                  }

  # ========================================
  # LAMBDA PERMISSIONS
  # ========================================

  # Hotel API Permissions
  RequestRepairPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RequestRepairFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HotelApi}/*/*'

  TrackRepairPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TrackRepairFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HotelApi}/*/*'

  FaqSimplePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FaqSimpleFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HotelApi}/*/*'

  # ========================================
  # API GATEWAY
  # ========================================

  HotelApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: Repair Service API
      Description: Midea Repair Service API
      Body:
        openapi: '3.0.1'
        info:
          title: 'Repair Service API'
          description: 'Midea Repair Service API'
          version: '1.0.0'
        paths:
          /repair/request:
            post:
              operationId: 'requestRepair'
              security:
                - api_key: []
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/RepairRequest'
              responses:
                '401':
                  description: 'Unauthorized - API key required'
                '400':
                  description: '400 response'
                '201':
                  description: '201 response'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RequestRepairFunction.Arn}/invocations'
          /repair/track:
            post:
              operationId: 'trackRepair'
              security:
                - api_key: []
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/TrackRepairRequest'
              responses:
                '401':
                  description: 'Unauthorized - API key required'
                '400':
                  description: '400 response'
                '403':
                  description: '403 response'
                '404':
                  description: '404 response'
                '200':
                  description: '200 response'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TrackRepairFunction.Arn}/invocations'
          /faq/simple:
            post:
              operationId: 'faqSimple'
              security:
                - api_key: []
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: 'object'
                      required:
                        - query
                      properties:
                        query:
                          type: 'string'
              responses:
                '401':
                  description: 'Unauthorized - API key required'
                '400':
                  description: '400 response'
                '200':
                  description: '200 response'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FaqSimpleFunction.Arn}/invocations'
        components:
          schemas:
            RepairRequest:
              type: 'object'
              required:
                - product_model
                - serial_number
                - purchase_date
                - issue_description
                - full_name
                - phone
                - service_address
                - preferred_time
                - warranty_status
              properties:
                product_model:
                  type: 'string'
                serial_number:
                  type: 'string'
                purchase_date:
                  type: 'string'
                  format: 'date'
                issue_description:
                  type: 'string'
                full_name:
                  type: 'string'
                phone:
                  type: 'string'
                service_address:
                  type: 'string'
                preferred_time:
                  type: 'string'
                warranty_status:
                  type: 'string'
                  enum: ['yes', 'no', 'unknown']
            TrackRepairRequest:
              type: 'object'
              required:
                - repair_notice_or_work_order_number
                - full_name
                - phone
                - need_to_reschedule_or_missed_visit
                - waiting_for_spare_part
              properties:
                repair_notice_or_work_order_number:
                  type: 'string'
                full_name:
                  type: 'string'
                phone:
                  type: 'string'
                need_to_reschedule_or_missed_visit:
                  type: 'string'
                  enum: ['yes', 'no']
                waiting_for_spare_part:
                  type: 'string'
                  enum: ['yes', 'no']
          securitySchemes:
            api_key:
              type: 'apiKey'
              name: 'X-API-Key'
              in: 'header'

  # API Key for authentication
  HotelApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub '${AWS::StackName}-api-key'
      Description: API Key for Hotel Reservation and Repair Service API
      Enabled: true
      GenerateDistinctId: true

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiGatewayAccount
    Properties:
      RestApiId: !Ref HotelApi

  ApiStageDev:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref HotelApi
      DeploymentId: !Ref ApiDeployment
      StageName: dev
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiLogGroup.Arn
        Format:
          '$context.requestId $context.requestTime $context.httpMethod
          $context.resourcePath $context.status $context.responseLength'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

Outputs:
  ApiUrl:
    Description: URL of the Repair Service API
    Value: !Sub 'https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  ApiKey:
    Description: Value of the API Key
    Value: !GetAtt ApiKeyValueRetrieval.ApiKeyValue
    Export:
      Name: !Sub '${AWS::StackName}-ApiKey'

  RepairTicketsTableName:
    Description: Name of the DynamoDB Repair Tickets table
    Value: !Ref RepairTicketsTable
    Export:
      Name: !Sub '${AWS::StackName}-RepairTicketsTable'

  OpenApiSpecS3Location:
    Description: S3 location of the uploaded OpenAPI specification
    Value: !GetAtt OpenApiUpload.S3Location
    Export:
      Name: !Sub '${AWS::StackName}-OpenApiSpec'

  ApiEndpoints:
    Description: Available API endpoints
    Value: !Sub |
      Request Repair: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/repair/request
      Track Repair: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/repair/track
      FAQ Simple: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/faq/simple
