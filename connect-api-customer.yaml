                  const getParams = {
                      TableName: process.env.REPAIR_TICKETS_TABLE_NAME,
                      Key: { ticketNumber: repair_notice_or_work_order_number },
                  };

                  const result = await docClient.send(new GetCommand(getParams));

                  if (!result.Item) {
                      console.log(JSON.stringify({
                          level: 'WARN',
                          message: 'Repair ticket not found',
                          requestId,
                          ticketNumber: repair_notice_or_work_order_number
                      }));
                      return {
                          statusCode: 404,
                          headers: {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                          },
                          body: JSON.stringify({
                              error: 'Repair ticket not found',
                          }),
                      };
                  }

                  // Verify customer information
                  if (result.Item.full_name !== full_name || result.Item.phone !== phone) {
                      console.log(JSON.stringify({
                          level: 'WARN',
                          message: 'Customer information mismatch',
                          requestId,
                          ticketNumber: repair_notice_or_work_order_number
                      }));
                      return {
                          statusCode: 403,
                          headers: {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                          },
                          body: JSON.stringify({
                              error: 'Customer information does not match',
                          }),
                      };
                  }

                  // Prepare response with ticket status and additional context
                  const responseData = {
                      ticketNumber: result.Item.ticketNumber,
                      status: result.Item.status,
                      product_model: result.Item.product_model,
                      issue_description: result.Item.issue_description,
                      service_address: result.Item.service_address,
                      preferred_time: result.Item.preferred_time,
                      warranty_status: result.Item.warranty_status,
                      createdAt: result.Item.createdAt,
                      updatedAt: result.Item.updatedAt,
                      need_to_reschedule_or_missed_visit,
                      waiting_for_spare_part
                  };

                  const response = {
                      statusCode: 200,
                      headers: {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      body: JSON.stringify({
                          message: 'Repair ticket found',
                          ticket: responseData
                      }),
                  };

                  console.log(JSON.stringify({
                      level: 'INFO',
                      message: 'Repair ticket retrieved successfully',
                      requestId,
                      ticketNumber: repair_notice_or_work_order_number,
                      response: response
                  }));

                  return response;
              } catch (error) {
                  console.log(JSON.stringify({
                      level: 'ERROR',
                      message: 'Error tracking repair ticket',
                      requestId,
                      error: error.message,
                      stack: error.stack
                  }));
                  return {
                      statusCode: 500,
                      headers: {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      body: JSON.stringify({
                          error: 'Internal server error',
                          message: error.message,
                      }),
                  };
              }
          };

  FaqSearchFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt RepairLambdaExecutionRole.Arn
      TracingConfig:
        Mode: Active
      LoggingConfig:
        LogGroup: !Ref RepairLambdaLogGroup
        LogFormat: JSON
      Timeout: 30
      Environment:
        Variables:
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import traceback

          bedrock_agent = boto3.client('bedrock-agent-runtime')

          def handler(event, context):
              request_id = event.get('requestContext', {}).get('requestId', 'unknown')
              print(json.dumps({
                  'level': 'INFO',
                  'message': 'FAQ search request received',
                  'requestId': request_id,
                  'event': event
              }))

              try:
                  # Handle both API Gateway and direct invocation
                  if 'body' in event and event['body']:
                      body = json.loads(event['body'])
                  else:
                      body = event

                  query = body.get('query')

                  if not query:
                      print(json.dumps({
                          'level': 'WARN',
                          'message': 'Missing query parameter',
                          'requestId': request_id
                      }))
                      return {
                          'statusCode': 400,
                          'headers': {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                          },
                          'body': json.dumps({'error': 'query parameter is required'})
                      }

                  knowledge_base_id = os.environ['KNOWLEDGE_BASE_ID']

                  print(json.dumps({
                      'level': 'INFO',
                      'message': 'Querying Bedrock Knowledge Base',
                      'requestId': request_id,
                      'knowledgeBaseId': knowledge_base_id,
                      'query': query
                  }))

                  # Retrieve information from knowledge base
                  response = bedrock_agent.retrieve(
                      knowledgeBaseId=knowledge_base_id,
                      retrievalQuery={
                          'text': query
                      },
                      retrievalConfiguration={
                          'vectorSearchConfiguration': {
                              'numberOfResults': 5
                          }
                      }
                  )

                  # Extract results
                  results = []
                  for retrieval_result in response.get('retrievalResults', []):
                      results.append({
                          'content': retrieval_result.get('content', {}).get('text', ''),
                          'score': retrieval_result.get('score', 0),
                          'location': retrieval_result.get('location', {})
                      })

                  result = {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      'body': json.dumps({
                          'query': query,
                          'results': results,
                          'count': len(results)
                      })
                  }

                  print(json.dumps({
                      'level': 'INFO',
                      'message': 'FAQ search completed successfully',
                      'requestId': request_id,
                      'resultCount': len(results),
                      'response': result
                  }))

                  return result

              except Exception as e:
                  print(json.dumps({
                      'level': 'ERROR',
                      'message': 'Error searching FAQ',
                      'requestId': request_id,
                      'error': str(e),
                      'stack': traceback.format_exc()
                  }))
                  return {
                      'statusCode': 500,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      'body': json.dumps({
                          'error': 'Internal server error',
                          'message': str(e)
                      })
                  }

  FaqSimpleFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt RepairLambdaExecutionRole.Arn
      TracingConfig:
        Mode: Active
      LoggingConfig:
        LogGroup: !Ref RepairLambdaLogGroup
        LogFormat: JSON
      Timeout: 10
      Code:
        ZipFile: |
          import json
          import traceback

          # Predefined FAQ database
          FAQ_DATABASE = [
              {
                  'id': 'faq-001',
                  'category': 'Air Conditioner',
                  'question': 'How do I reset my air conditioner?',
                  'answer': 'To reset your air conditioner: 1) Turn off the unit using the remote or control panel. 2) Unplug the power cord from the outlet. 3) Wait for 3-5 minutes. 4) Plug the power cord back in. 5) Turn on the unit. This will reset the internal electronics.',
                  'keywords': ['reset', 'air conditioner', 'ac', 'restart', 'reboot']
              },
              {
                  'id': 'faq-002',
                  'category': 'Air Conditioner',
                  'question': 'Why is my air conditioner not cooling?',
                  'answer': 'Common reasons for poor cooling: 1) Dirty air filter - clean or replace it. 2) Blocked air vents - ensure nothing is blocking airflow. 3) Incorrect temperature setting - set to a lower temperature. 4) Low refrigerant - contact service for refill. 5) Outdoor unit issues - check if outdoor unit is running.',
                  'keywords': ['not cooling', 'warm air', 'no cold', 'temperature', 'cooling problem']
              },
              {
                  'id': 'faq-003',
                  'category': 'Air Conditioner',
                  'question': 'How often should I clean the air filter?',
                  'answer': 'Clean the air filter every 2 weeks during heavy use (summer months). For moderate use, clean monthly. To clean: 1) Remove the filter from the unit. 2) Vacuum off loose dust. 3) Wash with warm water and mild detergent. 4) Rinse thoroughly. 5) Let it dry completely before reinstalling.',
                  'keywords': ['clean', 'filter', 'maintenance', 'wash', 'how often']
              },
              {
                  'id': 'faq-004',
                  'category': 'Refrigerator',
                  'question': 'Why is my refrigerator making loud noises?',
                  'answer': 'Common causes of refrigerator noise: 1) Compressor running - normal humming sound. 2) Ice maker filling - gurgling or hissing is normal. 3) Fan hitting something - check for ice buildup or loose items. 4) Uneven floor - level the refrigerator. 5) Loose parts - tighten any loose screws or panels.',
                  'keywords': ['noise', 'loud', 'sound', 'refrigerator', 'fridge', 'humming', 'buzzing']
              },
              {
                  'id': 'faq-005',
                  'category': 'Refrigerator',
                  'question': 'What temperature should I set my refrigerator?',
                  'answer': 'Recommended temperatures: Refrigerator compartment: 37-40°F (3-4°C). Freezer compartment: 0°F (-18°C). These temperatures keep food fresh and safe while maximizing energy efficiency. Use a refrigerator thermometer to verify actual temperature.',
                  'keywords': ['temperature', 'setting', 'cold', 'freezer', 'refrigerator', 'degrees']
              },
              {
                  'id': 'faq-006',
                  'category': 'Washing Machine',
                  'question': 'Why is my washing machine not draining?',
                  'answer': 'Steps to fix drainage issues: 1) Check drain hose for kinks or clogs. 2) Clean the drain pump filter (usually at front bottom). 3) Ensure drain hose is not inserted too far into standpipe. 4) Check for blockage in standpipe or drain. 5) If problem persists, the drain pump may need service.',
                  'keywords': ['not draining', 'water', 'drain', 'washing machine', 'washer', 'pump']
              },
              {
                  'id': 'faq-007',
                  'category': 'Washing Machine',
                  'question': 'How do I clean my washing machine?',
                  'answer': 'Monthly cleaning routine: 1) Run empty hot water cycle with 2 cups white vinegar. 2) Wipe door seal and remove any debris. 3) Clean detergent dispenser drawer. 4) Leave door open after use to prevent mold. 5) For deep cleaning, use washing machine cleaner tablet monthly.',
                  'keywords': ['clean', 'washing machine', 'maintenance', 'smell', 'odor', 'mold']
              },
              {
                  'id': 'faq-008',
                  'category': 'General',
                  'question': 'How do I schedule a repair service?',
                  'answer': 'To schedule repair service: 1) Use the /repair/request API endpoint with your product details. 2) Provide product model, serial number, and issue description. 3) You will receive a 10-digit ticket number. 4) A service technician will contact you within 24-48 hours. 5) Track your repair status using /repair/track endpoint.',
                  'keywords': ['repair', 'service', 'schedule', 'appointment', 'technician', 'fix']
              },
              {
                  'id': 'faq-009',
                  'category': 'General',
                  'question': 'What is covered under warranty?',
                  'answer': 'Standard warranty coverage: 1) Manufacturing defects - 1 year parts and labor. 2) Compressor - 5 years parts, 1 year labor (refrigerators/AC). 3) Not covered: Normal wear, misuse, unauthorized repairs, cosmetic damage. 4) Extended warranty available for purchase. 5) Keep purchase receipt for warranty claims.',
                  'keywords': ['warranty', 'coverage', 'guarantee', 'protection', 'claim']
              },
              {
                  'id': 'faq-010',
                  'category': 'General',
                  'question': 'Where can I find my product serial number?',
                  'answer': 'Serial number locations: Air Conditioner: Inside front panel or on side of unit. Refrigerator: Inside fresh food compartment on side wall or ceiling. Washing Machine: Inside door rim or on back panel. Format: Usually starts with letters followed by numbers (e.g., SN123456789). Take a photo for future reference.',
                  'keywords': ['serial number', 'model number', 'identification', 'locate', 'find']
              }
          ]

          def search_faq(query):
              """Simple keyword-based FAQ search"""
              query_lower = query.lower()
              results = []
              
              for faq in FAQ_DATABASE:
                  score = 0
                  
                  # Check if query matches question
                  if query_lower in faq['question'].lower():
                      score += 10
                  
                  # Check if query matches answer
                  if query_lower in faq['answer'].lower():
                      score += 5
                  
                  # Check if query matches keywords
                  for keyword in faq['keywords']:
                      if keyword in query_lower or query_lower in keyword:
                          score += 3
                  
                  # Check for word matches
                  query_words = query_lower.split()
                  for word in query_words:
                      if len(word) > 3:  # Only check words longer than 3 characters
                          if word in faq['question'].lower():
                              score += 2
                          if word in faq['answer'].lower():
                              score += 1
                          for keyword in faq['keywords']:
                              if word in keyword:
                                  score += 2
                  
                  if score > 0:
                      results.append({
                          'id': faq['id'],
                          'category': faq['category'],
                          'question': faq['question'],
                          'answer': faq['answer'],
                          'score': score
                      })
              
              # Sort by score (highest first) and return top 5
              results.sort(key=lambda x: x['score'], reverse=True)
              return results[:5]

          def handler(event, context):
              request_id = event.get('requestContext', {}).get('requestId', 'unknown')
              print(json.dumps({
                  'level': 'INFO',
                  'message': 'FAQ simple search request received',
                  'requestId': request_id,
                  'event': event
              }))

              try:
                  # Handle both API Gateway and direct invocation
                  if 'body' in event and event['body']:
                      body = json.loads(event['body'])
                  else:
                      body = event

                  query = body.get('query')

                  if not query:
                      print(json.dumps({
                          'level': 'WARN',
                          'message': 'Missing query parameter',
                          'requestId': request_id
                      }))
                      return {
                          'statusCode': 400,
                          'headers': {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                          },
                          'body': json.dumps({'error': 'query parameter is required'})
                      }

                  print(json.dumps({
                      'level': 'INFO',
                      'message': 'Searching FAQ database',
                      'requestId': request_id,
                      'query': query
                  }))

                  # Search FAQ database
                  results = search_faq(query)

                  result = {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      'body': json.dumps({
                          'query': query,
                          'results': results,
                          'count': len(results),
                          'source': 'simple_faq_database'
                      })
                  }

                  print(json.dumps({
                      'level': 'INFO',
                      'message': 'FAQ search completed successfully',
                      'requestId': request_id,
                      'resultCount': len(results),
                      'response': result
                  }))

                  return result

              except Exception as e:
                  print(json.dumps({
                      'level': 'ERROR',
                      'message': 'Error searching FAQ',
                      'requestId': request_id,
                      'error': str(e),
                      'stack': traceback.format_exc()
                  }))
                  return {
                      'statusCode': 500,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      'body': json.dumps({
                          'error': 'Internal server error',
                          'message': str(e)
                      })
                  }

