              security:
                - api_key: []
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: 'object'
                      required:
                        - query
                      properties:
                        query:
                          type: 'string'
              responses:
                '401':
                  description: 'Unauthorized - API key required'
                '400':
                  description: '400 response'
                '200':
                  description: '200 response'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FaqSimpleFunction.Arn}/invocations'
        components:
          schemas:
            Hotel:
              type: 'object'
              properties:
                hotelId:
                  type: 'string'
                name:
                  type: 'string'
                city:
                  type: 'string'
                state:
                  type: 'string'
                country:
                  type: 'string'
                address:
                  type: 'string'
                amenities:
                  type: 'array'
                  items:
                    type: 'string'
                description:
                  type: 'string'
                rating:
                  type: 'number'
                totalRooms:
                  type: 'number'
                phoneNumber:
                  type: 'string'
                email:
                  type: 'string'
            Room:
              type: 'object'
              properties:
                roomType:
                  type: 'string'
                available:
                  type: 'number'
                pricePerNight:
                  type: 'number'
            CreateReservationRequest:
              type: 'object'
              properties:
                hotelId:
                  type: 'string'
                customerId:
                  type: 'string'
                checkInDate:
                  type: 'string'
                  format: 'date'
                checkOutDate:
                  type: 'string'
                  format: 'date'
                roomType:
                  type: 'string'
                guestName:
                  type: 'string'
                guestEmail:
                  type: 'string'
                numberOfGuests:
                  type: 'number'
              required:
                - hotelId
                - customerId
                - checkInDate
                - checkOutDate
                - roomType
                - guestName
                - guestEmail
            Reservation:
              type: 'object'
              properties:
                reservationId:
                  type: 'string'
                hotelId:
                  type: 'string'
                customerId:
                  type: 'string'
                checkInDate:
                  type: 'string'
                  format: 'date'
                checkOutDate:
                  type: 'string'
                  format: 'date'
                roomType:
                  type: 'string'
                guestName:
                  type: 'string'
                guestEmail:
                  type: 'string'
                numberOfGuests:
                  type: 'number'
                status:
                  type: 'string'
                  enum: ['confirmed', 'cancelled']
                createdAt:
                  type: 'string'
                  format: 'date-time'
                totalAmount:
                  type: 'number'
            RepairRequest:
              type: 'object'
              required:
                - product_model
                - serial_number
                - purchase_date
                - issue_description
                - full_name
                - phone
                - service_address
                - preferred_time
                - warranty_status
              properties:
                product_model:
                  type: 'string'
                serial_number:
                  type: 'string'
                purchase_date:
                  type: 'string'
                  format: 'date'
                issue_description:
                  type: 'string'
                full_name:
                  type: 'string'
                phone:
                  type: 'string'
                service_address:
                  type: 'string'
                preferred_time:
                  type: 'string'
                warranty_status:
                  type: 'string'
                  enum: ['yes', 'no', 'unknown']
            TrackRepairRequest:
              type: 'object'
              required:
                - repair_notice_or_work_order_number
                - full_name
                - phone
                - need_to_reschedule_or_missed_visit
                - waiting_for_spare_part
              properties:
                repair_notice_or_work_order_number:
                  type: 'string'
                full_name:
                  type: 'string'
                phone:
                  type: 'string'
                need_to_reschedule_or_missed_visit:
                  type: 'string'
                  enum: ['yes', 'no']
                waiting_for_spare_part:
                  type: 'string'
                  enum: ['yes', 'no']
            ArrayOfHotel:
              type: 'array'
              items:
                $ref: '#/components/schemas/Hotel'
            ArrayOfRoom:
              type: 'array'
              items:
                $ref: '#/components/schemas/Room'
            ArrayOfReservation:
              type: 'array'
              items:
                $ref: '#/components/schemas/Reservation'
          securitySchemes:
            api_key:
              type: 'apiKey'
              name: 'X-API-Key'
              in: 'header'

  # API Key for authentication
  HotelApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub '${AWS::StackName}-api-key'
      Description: API Key for Hotel Reservation and Repair Service API
      Enabled: true
      GenerateDistinctId: true

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiGatewayAccount
    Properties:
      RestApiId: !Ref HotelApi

  ApiStageDev:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref HotelApi
      DeploymentId: !Ref ApiDeployment
      StageName: dev
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiLogGroup.Arn
        Format:
          '$context.requestId $context.requestTime $context.httpMethod
          $context.resourcePath $context.status $context.responseLength'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

Outputs:
  ApiUrl:
    Description: URL of the Connect Service API
    Value: !Sub 'https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  ApiKey:
    Description: Value of the API Key
    Value: !GetAtt ApiKeyValueRetrieval.ApiKeyValue
    Export:
      Name: !Sub '${AWS::StackName}-ApiKey'

  HotelTableName:
    Description: Name of the DynamoDB Hotels table
    Value: !Ref HotelsTable
    Export:
      Name: !Sub '${AWS::StackName}-HotelsTable'

  ReservationsTableName:
    Description: Name of the DynamoDB Reservations table
    Value: !Ref ReservationsTable
    Export:
      Name: !Sub '${AWS::StackName}-ReservationsTable'

  RepairTicketsTableName:
    Description: Name of the DynamoDB Repair Tickets table
    Value: !Ref RepairTicketsTable
    Export:
      Name: !Sub '${AWS::StackName}-RepairTicketsTable'

  OpenApiSpecS3Location:
    Description: S3 location of the uploaded OpenAPI specification
    Value: !GetAtt OpenApiUpload.S3Location
    Export:
      Name: !Sub '${AWS::StackName}-OpenApiSpec'

  ApiEndpoints:
    Description: Available API endpoints
    Value: !Sub |
      Hotel Search: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/hotels/search
      Create Reservation: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/reservations
      Cancel Reservation: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/reservations/cancel
      Get Customer Reservations: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/reservations/customer
      Modify Reservation: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/reservations/modify
      Request Repair: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/repair/request
      Track Repair: https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/repair/track
      FAQ Search (Bedrock): https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/faq/search
      FAQ Simple (No Bedrock): https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev/faq/simple
