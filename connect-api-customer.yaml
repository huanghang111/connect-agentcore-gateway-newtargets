AWSTemplateFormatVersion: '2010-09-09'
Description: 'Midea Repair Service API'

Parameters:
  OpenApiSpecUrl:
    Type: String
    Description: 'URL to fetch OpenAPI specification from (YAML format)'
    Default: ''

Resources:
  # API Gateway CloudWatch Role
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
    DeletionPolicy: Delete

  # API Gateway Account
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  # CloudWatch Log Group for API Gateway
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${AWS::StackName}'
      RetentionInDays: 7
    DeletionPolicy: Delete

  # CloudWatch Log Group for Hotel Lambda Functions
  RepairLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-repair-api'
      RetentionInDays: 7
    DeletionPolicy: Delete

  # DynamoDB Tables
  RepairTicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: ticketNumber
          AttributeType: S
        - AttributeName: phone
          AttributeType: S
      KeySchema:
        - AttributeName: ticketNumber
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: PhoneIndex
          KeySchema:
            - AttributeName: phone
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
    DeletionPolicy: Delete

  # Lambda Execution Role for Hotel APIs
  RepairLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub '${RepairLambdaLogGroup.Arn}:*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt RepairTicketsTable.Arn
                  - !Sub '${RepairTicketsTable.Arn}/index/*'
        - PolicyName: XRayAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'
    DeletionPolicy: Delete

  # Custom Resource Lambda Role for API Key Retrieval
  ApiKeyRetrievalRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiGatewayAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - apigateway:GET
                Resource: !Sub 'arn:aws:apigateway:${AWS::Region}::/apikeys/*'
    DeletionPolicy: Delete

  # Custom Resource Lambda Role for Data Seeding
  ApiKeyRetrievalFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt ApiKeyRetrievalRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              response_data = {}
              try:
                  print(f"Received event: {json.dumps(event, default=str)}")

                  if event['RequestType'] == 'Delete':
                      print("Delete request - sending success response")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  api_key_id = event['ResourceProperties']['ApiKeyId']
                  print(f"Getting API key value for: {api_key_id}")

                  client = boto3.client('apigateway')
                  response = client.get_api_key(apiKey=api_key_id, includeValue=True)

                  api_key_value = response['value']
                  response_data = {'ApiKeyValue': api_key_value}

                  print(f"Successfully retrieved API key value")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)

              except Exception as e:
                  error_message = f"Error in API Key retrieval: {str(e)}"
                  print(error_message)

                  # Always send a response to prevent CloudFormation from hanging
                  try:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {
                          'Error': error_message
                      })
                  except Exception as send_error:
                      print(f"Failed to send error response: {str(send_error)}")
                      # Last resort - try to send minimal response
                      try:
                          cfnresponse.send(event, context, cfnresponse.FAILED, {})
                      except:
                          print("Complete failure to send any response to CloudFormation")
    DeletionPolicy: Delete

  # Custom Resource to Get API Key Value
  ApiKeyValueRetrieval:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt ApiKeyRetrievalFunction.Arn
      ApiKeyId: !Ref HotelApiKey
    DependsOn: HotelApiKey

  # S3 Bucket for OpenAPI Specification
  OpenApiBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
    DeletionPolicy: Delete

  # Custom Resource Lambda Role for S3 Upload
  S3UploadRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - !Sub '${OpenApiBucket.Arn}'
                  - !Sub '${OpenApiBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Ref 'AWS::StackId'
    DeletionPolicy: Delete

  # Custom Resource Lambda Function to Upload OpenAPI Spec
  S3UploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt S3UploadRole.Arn
      Timeout: 60
      MemorySize: 512
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import urllib.request
          import urllib.error
          import re

          def fetch_openapi_spec(url):
              """Fetch OpenAPI spec from URL (supports S3 URIs, S3 HTTPS URLs, and regular HTTP/HTTPS)"""
              print(f"Fetching OpenAPI spec from: {url}")

              # Check if it's an S3 URI (s3://bucket/key)
              s3_uri_match = re.match(r's3://([^/]+)/(.+)', url)
              if s3_uri_match:
                  bucket = s3_uri_match.group(1)
                  key = s3_uri_match.group(2)
                  print(f"Detected S3 URI - Bucket: {bucket}, Key: {key}")
                  
                  s3_client = boto3.client('s3')
                  response = s3_client.get_object(Bucket=bucket, Key=key)
                  content = response['Body'].read().decode('utf-8')
                  print(f"Successfully fetched OpenAPI spec from S3 ({len(content)} bytes)")
                  return content

              # Check if it's an S3 HTTPS URL (https://bucket.s3.region.amazonaws.com/key)
              s3_https_match = re.match(r'https://([^.]+)\.s3\.([^.]+)\.amazonaws\.com/(.+)', url)
              if s3_https_match:
                  bucket = s3_https_match.group(1)
                  key = s3_https_match.group(3)
                  print(f"Detected S3 HTTPS URL - Bucket: {bucket}, Key: {key}")
                  
                  s3_client = boto3.client('s3')
                  response = s3_client.get_object(Bucket=bucket, Key=key)
                  content = response['Body'].read().decode('utf-8')
                  print(f"Successfully fetched OpenAPI spec from S3 ({len(content)} bytes)")
                  return content

              # Regular HTTP(S) URL
              print(f"Using HTTP(S) client for URL: {url}")
              try:
                  request = urllib.request.Request(url)
                  print(f"Request headers: {request.headers}")

                  with urllib.request.urlopen(request) as response:
                      print(f"Response status: {response.status}")
                      print(f"Response headers: {dict(response.headers)}")
                      content = response.read().decode('utf-8')
                      print(f"Successfully fetched OpenAPI spec ({len(content)} bytes)")
                      return content

              except urllib.error.HTTPError as e:
                  print(f"HTTP Error {e.code}: {e.reason}")
                  print(f"Response headers: {dict(e.headers)}")
                  print(f"Response body: {e.read().decode('utf-8', errors='ignore')}")
                  raise
              except urllib.error.URLError as e:
                  print(f"URL Error: {e.reason}")
                  raise
              except Exception as e:
                  print(f"Unexpected error: {type(e).__name__}: {str(e)}")
                  raise

          def handler(event, context):
              response_data = {}
              try:
                  print(f"Received event: {json.dumps(event, default=str)}")

                  bucket_name = event['ResourceProperties']['BucketName']
                  openapi_spec_url = event['ResourceProperties'].get('OpenApiSpecUrl', '')
                  api_gateway_url = event['ResourceProperties']['ApiGatewayUrl']

                  print(f"Processing request for bucket: {bucket_name}")

                  s3 = boto3.client('s3')

                  # Only delete S3 object if the entire stack is being deleted (not during resource replacement)
                  if event['RequestType'] == 'Delete':
                      print("Delete request received - checking if this is a stack deletion or resource replacement")

                      # Check if this is a stack deletion by examining the stack status
                      try:
                          cloudformation = boto3.client('cloudformation')
                          stack_name = event['StackId'].split('/')[-2]  # Extract stack name from ARN

                          response = cloudformation.describe_stacks(StackName=stack_name)
                          stack_status = response['Stacks'][0]['StackStatus']

                          print(f"Stack status: {stack_status}")

                          # Only delete S3 object if stack is being deleted (not during updates/replacements)
                          if stack_status in ['DELETE_IN_PROGRESS']:
                              print("Stack is being deleted - cleaning up S3 object")
                              s3.delete_object(Bucket=bucket_name, Key='openapi.yaml')
                              print("Successfully deleted openapi.yaml from S3")
                          else:
                              print("Resource replacement during stack update - preserving S3 object")

                      except Exception as check_error:
                          print(f"Could not determine stack status (preserving S3 object): {str(check_error)}")
                          # If we can't determine the stack status, err on the side of caution and don't delete

                      # Use the same physical resource ID for consistency
                      physical_resource_id = f"openapi-upload-{bucket_name}"
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_resource_id)
                      return

                  # For Create and Update operations, upload/update the file
                  print(f"Processing {event['RequestType']} request - uploading OpenAPI spec")

                  # Fetch OpenAPI spec from URL
                  if not openapi_spec_url:
                      raise ValueError("OpenApiSpecUrl parameter is required")

                  print(f"OpenAPI spec URL: {openapi_spec_url}")
                  print(f"URL scheme: {openapi_spec_url.split(':')[0]}")
                  print(f"Attempting to fetch from URL...")

                  yaml_content = fetch_openapi_spec(openapi_spec_url)

                  # Replace the server URL placeholder if it exists
                  yaml_content = yaml_content.replace('${API_GATEWAY_URL}', api_gateway_url)

                  print(f"Uploading YAML content to S3 bucket: {bucket_name}")
                  print(f"Content length: {len(yaml_content)} bytes")
                  print(f"S3 Key: openapi.yaml")

                  try:
                      s3.put_object(
                          Bucket=bucket_name,
                          Key='openapi.yaml',
                          Body=yaml_content,
                          ContentType='application/x-yaml'
                      )
                      print(f"Successfully uploaded to S3")
                  except Exception as s3_error:
                      print(f"S3 put_object failed: {type(s3_error).__name__}: {str(s3_error)}")
                      if hasattr(s3_error, 'response'):
                          print(f"S3 Error Response: {s3_error.response}")
                      raise

                  s3_location = f's3://{bucket_name}/openapi.yaml'
                  response_data = {
                      'S3Location': s3_location,
                      'BucketName': bucket_name,
                      'ObjectKey': 'openapi.yaml'
                  }

                  print(f"Successfully uploaded OpenAPI spec to: {s3_location}")

                  # Use a consistent physical resource ID to prevent unnecessary replacements
                  physical_resource_id = f"openapi-upload-{bucket_name}"
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, physical_resource_id)

              except Exception as e:
                  error_message = f"Error in S3 upload: {str(e)}"
                  print(error_message)

                  # Always send a response to prevent CloudFormation from hanging
                  try:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {
                          'Error': error_message
                      })
                  except Exception as send_error:
                      print(f"Failed to send error response: {str(send_error)}")
                      # Last resort - try to send minimal response
                      try:
                          cfnresponse.send(event, context, cfnresponse.FAILED, {})
                      except:
                          print("Complete failure to send any response to CloudFormation")
    DeletionPolicy: Delete

  # Custom Resource to Upload OpenAPI Spec
  OpenApiUpload:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt S3UploadFunction.Arn
      BucketName: !Ref OpenApiBucket
      OpenApiSpecUrl: !Ref OpenApiSpecUrl
      ApiGatewayUrl: !Sub 'https://${HotelApi}.execute-api.${AWS::Region}.amazonaws.com/dev'
    DependsOn: OpenApiBucket

  # ========================================
  # HOTEL API LAMBDA FUNCTIONS
  # ========================================

  RequestRepairFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt RepairLambdaExecutionRole.Arn
      TracingConfig:
        Mode: Active
      LoggingConfig:
        LogGroup: !Ref RepairLambdaLogGroup
        LogFormat: JSON
      Environment:
        Variables:
          REPAIR_TICKETS_TABLE_NAME: !Ref RepairTicketsTable
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, PutCommand } = require('@aws-sdk/lib-dynamodb');
          const { randomInt } = require('crypto');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          // Generate a random 10-digit ticket number
          function generateTicketNumber() {
              const min = 1000000000;
              const max = 9999999999;
              return randomInt(min, max + 1).toString();
          }

          exports.handler = async (event) => {
              const requestId = event.requestContext?.requestId || 'unknown';
              console.log(JSON.stringify({
                  level: 'INFO',
                  message: 'Request repair request received',
                  requestId,
                  event: event
              }));

              try {
                  const body = JSON.parse(event.body || '{}');
                  const {
                      product_model,
                      serial_number,
                      purchase_date,
                      issue_description,
                      full_name,
                      phone,
                      service_address,
                      preferred_time,
                      warranty_status
                  } = body;

                  // Validate required fields
                  const requiredFields = {
                      product_model,
                      serial_number,
                      purchase_date,
                      issue_description,
                      full_name,
                      phone,
                      service_address,
                      preferred_time,
                      warranty_status
                  };

                  const missingFields = Object.entries(requiredFields)
                      .filter(([key, value]) => !value)
                      .map(([key]) => key);

                  if (missingFields.length > 0) {
                      console.log(JSON.stringify({
                          level: 'WARN',
                          message: 'Missing required fields',
                          requestId,
                          missingFields
                      }));
                      return {
                          statusCode: 400,
                          headers: {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                          },
                          body: JSON.stringify({
                              error: `Missing required fields: ${missingFields.join(', ')}`,
                          }),
                      };
                  }

                  const ticketNumber = generateTicketNumber();
                  const repairTicket = {
                      ticketNumber,
                      product_model,
                      serial_number,
                      purchase_date,
                      issue_description,
                      full_name,
                      phone,
                      service_address,
                      preferred_time,
                      warranty_status,
                      status: 'pending',
                      createdAt: new Date().toISOString(),
                      updatedAt: new Date().toISOString()
                  };

                  const params = {
                      TableName: process.env.REPAIR_TICKETS_TABLE_NAME,
                      Item: repairTicket,
                  };

                  await docClient.send(new PutCommand(params));

                  const response = {
                      statusCode: 201,
                      headers: {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      body: JSON.stringify({
                          message: 'Repair ticket created successfully',
                          ticketNumber,
                          ticket: repairTicket
                      }),
                  };

                  console.log(JSON.stringify({
                      level: 'INFO',
                      message: 'Repair ticket created successfully',
                      requestId,
                      ticketNumber,
                      response: response
                  }));

                  return response;
              } catch (error) {
                  console.log(JSON.stringify({
                      level: 'ERROR',
                      message: 'Error creating repair ticket',
                      requestId,
                      error: error.message,
                      stack: error.stack
                  }));
                  return {
                      statusCode: 500,
                      headers: {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      body: JSON.stringify({
                          error: 'Internal server error',
                          message: error.message,
                      }),
                  };
              }
          };

  TrackRepairFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt RepairLambdaExecutionRole.Arn
      TracingConfig:
        Mode: Active
      LoggingConfig:
        LogGroup: !Ref RepairLambdaLogGroup
        LogFormat: JSON
      Environment:
        Variables:
          REPAIR_TICKETS_TABLE_NAME: !Ref RepairTicketsTable
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, GetCommand, QueryCommand } = require('@aws-sdk/lib-dynamodb');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          exports.handler = async (event) => {
              const requestId = event.requestContext?.requestId || 'unknown';
              console.log(JSON.stringify({
                  level: 'INFO',
                  message: 'Track repair request received',
                  requestId,
                  event: event
              }));

              try {
                  const body = JSON.parse(event.body || '{}');
                  const {
                      repair_notice_or_work_order_number,
                      full_name,
                      phone,
                      need_to_reschedule_or_missed_visit,
                      waiting_for_spare_part
                  } = body;

                  // Validate required fields
                  if (!repair_notice_or_work_order_number || !full_name || !phone || 
                      need_to_reschedule_or_missed_visit === undefined || 
                      waiting_for_spare_part === undefined) {
                      const missingFields = [];
                      if (!repair_notice_or_work_order_number) missingFields.push('repair_notice_or_work_order_number');
                      if (!full_name) missingFields.push('full_name');
                      if (!phone) missingFields.push('phone');
                      if (need_to_reschedule_or_missed_visit === undefined) missingFields.push('need_to_reschedule_or_missed_visit');
                      if (waiting_for_spare_part === undefined) missingFields.push('waiting_for_spare_part');

                      console.log(JSON.stringify({
                          level: 'WARN',
                          message: 'Missing required fields',
                          requestId,
                          missingFields
                      }));
                      return {
                          statusCode: 400,
                          headers: {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                          },
                          body: JSON.stringify({
                              error: `Missing required fields: ${missingFields.join(', ')}`,
                          }),
                      };
                  }

                  console.log(JSON.stringify({
                      level: 'INFO',
                      message: 'Fetching repair ticket',
                      requestId,
                      ticketNumber: repair_notice_or_work_order_number
                  }));

                  // Get ticket by ticket number
                  const getParams = {
                      TableName: process.env.REPAIR_TICKETS_TABLE_NAME,
                      Key: { ticketNumber: repair_notice_or_work_order_number },
                  };

                  const result = await docClient.send(new GetCommand(getParams));

                  if (!result.Item) {
                      console.log(JSON.stringify({
                          level: 'WARN',
                          message: 'Repair ticket not found',
                          requestId,
                          ticketNumber: repair_notice_or_work_order_number
                      }));
                      return {
                          statusCode: 404,
                          headers: {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                          },
                          body: JSON.stringify({
                              error: 'Repair ticket not found',
                          }),
                      };
                  }

                  // Verify customer information
                  if (result.Item.full_name !== full_name || result.Item.phone !== phone) {
                      console.log(JSON.stringify({
                          level: 'WARN',
                          message: 'Customer information mismatch',
                          requestId,
                          ticketNumber: repair_notice_or_work_order_number
                      }));
                      return {
                          statusCode: 403,
                          headers: {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                          },
                          body: JSON.stringify({
                              error: 'Customer information does not match',
                          }),
                      };
                  }

                  // Prepare response with ticket status and additional context
                  const responseData = {
                      ticketNumber: result.Item.ticketNumber,
                      status: result.Item.status,
                      product_model: result.Item.product_model,
                      issue_description: result.Item.issue_description,
                      service_address: result.Item.service_address,
                      preferred_time: result.Item.preferred_time,
                      warranty_status: result.Item.warranty_status,
                      createdAt: result.Item.createdAt,
                      updatedAt: result.Item.updatedAt,
                      need_to_reschedule_or_missed_visit,
                      waiting_for_spare_part
                  };

                  const response = {
                      statusCode: 200,
                      headers: {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      body: JSON.stringify({
                          message: 'Repair ticket found',
                          ticket: responseData
                      }),
                  };

                  console.log(JSON.stringify({
                      level: 'INFO',
                      message: 'Repair ticket retrieved successfully',
                      requestId,
                      ticketNumber: repair_notice_or_work_order_number,
                      response: response
                  }));

                  return response;
              } catch (error) {
                  console.log(JSON.stringify({
                      level: 'ERROR',
                      message: 'Error tracking repair ticket',
                      requestId,
                      error: error.message,
                      stack: error.stack
                  }));
                  return {
                      statusCode: 500,
                      headers: {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                      },
                      body: JSON.stringify({
                          error: 'Internal server error',
                          message: error.message,
                      }),
                  };
              }
          };

  FaqSimpleFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt RepairLambdaExecutionRole.Arn
      TracingConfig:
        Mode: Active
      LoggingConfig:
        LogGroup: !Ref RepairLambdaLogGroup
        LogFormat: JSON
      Timeout: 10
      Code:
        ZipFile: |
          import json
          import traceback

          # Predefined FAQ database
          FAQ_DATABASE = [
              {
                  'id': 'faq-001',
                  'category': 'Air Conditioner',
                  'question': 'How do I reset my air conditioner?',
                  'answer': 'To reset your air conditioner: 1) Turn off the unit using the remote or control panel. 2) Unplug the power cord from the outlet. 3) Wait for 3-5 minutes. 4) Plug the power cord back in. 5) Turn on the unit. This will reset the internal electronics.',
                  'keywords': ['reset', 'air conditioner', 'ac', 'restart', 'reboot']
              },
              {
                  'id': 'faq-002',
                  'category': 'Air Conditioner',
                  'question': 'Why is my air conditioner not cooling?',
                  'answer': 'Common reasons for poor cooling: 1) Dirty air filter - clean or replace it. 2) Blocked air vents - ensure nothing is blocking airflow. 3) Incorrect temperature setting - set to a lower temperature. 4) Low refrigerant - contact service for refill. 5) Outdoor unit issues - check if outdoor unit is running.',
                  'keywords': ['not cooling', 'warm air', 'no cold', 'temperature', 'cooling problem']
